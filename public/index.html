<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#060d18" />
    <meta name="description" content="TradingStars — Platform analisa saham untuk komunitas TradingStars. Pivot Point, Bandar Tracker, Smart Money Analysis." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TradingStars" />
    <meta property="og:title" content="TradingStars Trading Analyzer" />
    <meta property="og:description" content="Analisa Pivot Point dan deteksi aktivitas bandar untuk saham IDX" />
    <meta property="og:image" content="/logo.jpg" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <title>TradingStars — Trading Analyzer Pro</title>
    <style>
      *, *::before, *::after {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }

      /* ── Hapus spinner input number ── */
      input[type=number]::-webkit-outer-spin-button,
      input[type=number]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type=number] { -moz-appearance: textfield; }

      /* ── Scrollbar tipis ── */
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 99px; }

      /* ── Responsive typography ── */
      @media (max-width: 380px) {
        html { font-size: 14px; }
      }
      @media (max-width: 320px) {
        html { font-size: 13px; }
      }

      /* ── Prevent text overflow everywhere ── */
      * { word-break: break-word; }

      /* ── Better button/input on iOS ── */
      button, input, select, textarea {
        font-family: inherit;
        -webkit-appearance: none;
        border-radius: 0;
      }
      button { cursor: pointer; }

      /* ── Ensure canvas doesn't overflow ── */
      canvas { max-width: 100%; }

      /* ── Safe area for iPhone notch ── */
      #root {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
    </style>
  </head>
  <body>
    <noscript>Aktifkan JavaScript untuk menggunakan TradingStars Trading Analyzer.</noscript>
    <div id="root"></div>
  </body>
</html>
